<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><link rel="stylesheet" href="mockup.css"/></head>
<body>
<div class="topbar"><span>Im Not Lazy</span><span style="font-size:0.8125rem;color:var(--color-text-muted)">Dark</span></div>
<div class="content">
  <div class="title">Dashboard</div>
  <div class="sub">Your progress at a glance.</div>
  <div class="grid2">
    <div class="card"><div class="card__label">Current streak</div><div class="card__value">7</div><p style="font-size:0.6875rem;color:var(--color-text-muted)">days checking in</p></div>
    <div class="card"><div class="card__label">Best streak</div><div class="card__value">12</div><p style="font-size:0.6875rem;color:var(--color-text-muted)">personal record</p></div>
  </div>
  <div class="card card--accent">
    <div class="card__label">Hours reclaimed this week</div>
    <div class="card__value">4.5</div>
    <p class="equivalent">About 3 focused study sessions</p>
  </div>
  <div class="section-label">Weekly usage trend</div>
  <div class="chart">
    <div class="bar" style="height:55%"></div><div class="bar" style="height:40%"></div>
    <div class="bar" style="height:65%"></div><div class="bar" style="height:30%"></div>
    <div class="bar" style="height:45%"></div><div class="bar" style="height:25%"></div>
    <div class="bar" style="height:35%"></div>
  </div>
  <span class="badge">Instagram setup complete</span>
</div>
<div class="nav"><span class="active">Dashboard</span><span>Check-in</span><span>Setup</span><span>Learn</span><span>Settings</span></div>
</body></html>
